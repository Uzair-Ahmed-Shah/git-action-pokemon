name: Git Actiong to test Automation
on:
    push:
        branches: [main]
jobs:
    node-setup-job: 
      runs-on: ubuntu-latest

      defaults:
        run:
          working-directory: backend

      steps:
          - name: Checkout Repo
            uses: actions/checkout@v4

          - name: Initialize Node
            uses: actions/setup-node@v4

          - name: Install Node
            run: npm install

          - name: Test Backend
            run: npm test
            
